<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Setup Guide</title>
  <meta name="description" content="Get your own 24/7 AI assistant.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='70' font-size='70'>🤖</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #fff;
      color: #1a1a1a;
      font-size: 18px;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 540px; margin: 0 auto; padding: 60px 24px 80px; }

    h1 { font-size: 36px; font-weight: 700; line-height: 1.2; margin-bottom: 12px; letter-spacing: -0.5px; }
    .subtitle { color: #666; font-size: 20px; margin-bottom: 60px; }

    h2 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: #999; margin-bottom: 24px; margin-top: 48px; font-family: -apple-system, system-ui, sans-serif; }

    p { margin-bottom: 16px; color: #333; }
    a { color: #1a1a1a; text-decoration: underline; text-underline-offset: 3px; }
    a:hover { color: #000; }

    .steps { margin: 16px 0 24px; padding-left: 24px; }
    .steps li { margin-bottom: 8px; color: #444; }
    .steps code { font-family: 'SF Mono', Menlo, monospace; font-size: 15px; background: #f5f5f5; padding: 2px 6px; border-radius: 3px; }

    label { display: block; font-size: 15px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; font-family: -apple-system, system-ui, sans-serif; }
    input, select {
      display: block; width: 100%; padding: 14px 16px;
      font-size: 16px; font-family: 'SF Mono', Menlo, monospace;
      border: 1px solid #ddd; border-radius: 6px;
      background: #fafafa; color: #1a1a1a;
      margin-bottom: 8px;
    }
    input:focus, select:focus { outline: none; border-color: #999; background: #fff; }
    input::placeholder { color: #bbb; }
    .hint { font-size: 14px; color: #999; margin-bottom: 32px; font-family: -apple-system, system-ui, sans-serif; }
    .hint a { color: #999; }

    .pick { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
    .pick-card {
      padding: 28px 20px; text-align: center; cursor: pointer;
      border: 1px solid #e0e0e0; border-radius: 8px;
      transition: border-color 0.15s;
      font-family: -apple-system, system-ui, sans-serif;
    }
    .pick-card:hover { border-color: #999; }
    .pick-card.on { border-color: #1a1a1a; background: #fafafa; }
    .pick-card .icon { font-size: 36px; margin-bottom: 12px; }
    .pick-card .title { font-size: 16px; font-weight: 600; color: #1a1a1a; }
    .pick-card .desc { font-size: 13px; color: #999; margin-top: 4px; }

    .cloud-extra { display: none; margin-top: 8px; }
    .cloud-extra.show { display: block; }

    .plans { display: flex; gap: 8px; margin-bottom: 32px; font-family: -apple-system, system-ui, sans-serif; }
    .plan { flex: 1; text-align: center; padding: 12px 8px; border: 1px solid #e0e0e0; border-radius: 6px; }
    .plan .amt { font-size: 20px; font-weight: 700; color: #1a1a1a; }
    .plan .name { font-size: 12px; color: #999; margin-top: 2px; }
    .plan.pick { border-color: #1a1a1a; }
    .plan.pick .name { color: #1a1a1a; }

    .cmd {
      font-family: 'SF Mono', Menlo, monospace; font-size: 14px;
      background: #f5f5f5; border: 1px solid #e5e5e5; border-radius: 6px;
      padding: 16px; margin: 16px 0 8px;
      white-space: pre-wrap; word-break: break-all; line-height: 1.6;
      cursor: pointer; position: relative; color: #333;
    }
    .cmd:hover { background: #f0f0f0; }
    .cmd::after { content: 'Click to copy'; position: absolute; top: 8px; right: 12px; font-size: 11px; color: #bbb; font-family: -apple-system, system-ui, sans-serif; }
    .cmd.copied::after { content: 'Copied'; color: #666; }

    button {
      display: block; width: 100%; padding: 16px;
      font-size: 16px; font-weight: 600;
      font-family: -apple-system, system-ui, sans-serif;
      background: #1a1a1a; color: #fff;
      border: none; border-radius: 6px; cursor: pointer;
      margin-top: 40px; transition: background 0.15s;
    }
    button:hover { background: #333; }

    .back { display: inline-block; font-size: 14px; color: #999; margin-top: 16px; cursor: pointer; font-family: -apple-system, system-ui, sans-serif; text-decoration: none; }
    .back:hover { color: #666; }

    .spinner { width: 32px; height: 32px; border: 2px solid #e0e0e0; border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { text-align: center; color: #666; font-size: 16px; }
    .status strong { color: #1a1a1a; }

    hr { border: none; border-top: 1px solid #eee; margin: 48px 0; }

    .section { margin-top: 40px; }
    .section h3 { font-size: 20px; font-weight: 700; margin-bottom: 12px; font-family: Georgia, serif; }
    .section ol { margin-left: 24px; margin-top: 8px; line-height: 2; color: #444; font-size: 16px; }

    .done { text-align: center; margin-top: 48px; padding: 40px 0; }
    .done h3 { font-size: 28px; margin-bottom: 8px; }
    .done p { color: #666; }

    footer { text-align: center; color: #ccc; font-size: 13px; padding: 0 24px 40px; font-family: -apple-system, system-ui, sans-serif; }
    footer a { color: #ccc; text-decoration: none; }

    @media (max-width: 480px) {
      h1 { font-size: 28px; }
      .pick { grid-template-columns: 1fr; }
      .plans { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="wrap" id="app"></div>

<footer>
  <a href="https://humanitylabs.org">Humanity Labs</a> · <a href="https://openclaw.ai">OpenClaw</a> · <a href="https://discord.com/invite/clawd">Discord</a>
</footer>

<script>
const S = { view: 'form', path: null, claude: '', brave: '', hostinger: '', region: '' };

function render() {
  document.getElementById('app').innerHTML = views[S.view]();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

const views = {
  form: () => `
    <h1>Set up your AI assistant</h1>
    <p class="subtitle">One form. We handle the rest.</p>

    <h2>Claude subscription</h2>
    <p>Your AI runs on Claude by Anthropic. <a href="https://claude.ai/upgrade" target="_blank">Subscribe here</a>, then generate a setup token:</p>
    <ol class="steps">
      <li>Install <a href="https://claude.ai/download" target="_blank">Claude Code</a></li>
      <li>Open Terminal, run <code>claude setup-token</code></li>
      <li>Copy the token</li>
    </ol>
    <div class="plans">
      <div class="plan"><div class="amt">$20</div><div class="name">Pro</div></div>
      <div class="plan"><div class="amt">$100</div><div class="name">Max 5x</div></div>
      <div class="plan pick"><div class="amt">$200</div><div class="name">Max 20x ★</div></div>
    </div>
    <label>Setup token</label>
    <input type="password" id="in_claude" placeholder="Paste your token" autocomplete="off">
    <div class="hint">Stays in your browser. We never see it.</div>

    <h2>Web search</h2>
    <p>So your AI can search the internet. <a href="https://brave.com/search/api" target="_blank">Get a free key here.</a></p>
    <label>Brave Search API key</label>
    <input type="password" id="in_brave" placeholder="Paste your key" autocomplete="off">
    <div class="hint">Free tier. $5 in credits per month.</div>

    <h2>Where to install</h2>
    <div class="pick">
      <div class="pick-card${S.path==='cloud'?' on':''}" onclick="pick('cloud',this)">
        <div class="icon">☁️</div>
        <div class="title">Cloud server</div>
        <div class="desc">~$5/mo · always on</div>
      </div>
      <div class="pick-card${S.path==='local'?' on':''}" onclick="pick('local',this)">
        <div class="icon">💻</div>
        <div class="title">My computer</div>
        <div class="desc">Free · Mac, Linux, Pi</div>
      </div>
    </div>

    <div class="cloud-extra${S.path==='cloud'?' show':''}" id="cloud_extra">
      <p>We use <a href="https://www.hostinger.com/vps-hosting?REFERRALCODE=XLSMIGUELN7E" target="_blank">Hostinger</a> to create your server automatically. Sign up, add a payment method, then go to <strong>Account → API</strong> to create a key.</p>
      <label>Hostinger API key</label>
      <input type="password" id="in_hostinger" placeholder="Paste your key" autocomplete="off">
      <div class="hint">We'll create a KVM 2 server for you.</div>
      <label>Server location</label>
      <select id="in_region">
        <option value="2">North America</option>
        <option value="13">Europe</option>
        <option value="22">Asia</option>
        <option value="5">United Kingdom</option>
        <option value="8">South America</option>
      </select>
    </div>

    <button onclick="go()">Set up my AI</button>
  `,

  creating: () => `
    <h1>Creating your server</h1>
    <p class="subtitle">This takes 2-5 minutes.</p>
    <div class="spinner"></div>
    <p class="status" id="status_text">Uploading setup script...</p>
  `,

  local: () => `
    <h1>Run this in Terminal</h1>
    <p class="subtitle">One command. It installs and configures everything.</p>
    <div class="cmd" onclick="copy(this)">${esc(localScript())}</div>
    <p style="color:#999;font-size:14px;font-family:-apple-system,system-ui,sans-serif">The command will pause once to connect Tailscale. Follow the link it prints.</p>
    <button onclick="S.view='connect';render()">Done — show me how to connect</button>
    <a class="back" onclick="S.view='form';render()">← Back</a>
  `,

  connect: () => `
    <h1>Connect to your AI</h1>
    <p class="subtitle">Your assistant is running. Pick how to talk to it.</p>

    <div class="section">
      <h3>Telegram</h3>
      <p>Chat like you're texting a friend.</p>
      <ol>
        <li>Message <a href="https://t.me/botfather" target="_blank">@BotFather</a> on Telegram</li>
        <li>Send <code>/newbot</code>, follow the prompts</li>
        <li>Copy the token, then run:</li>
      </ol>
      <div class="cmd" onclick="copy(this)">openclaw channels add --channel telegram --token YOUR_BOT_TOKEN && openclaw gateway restart</div>
    </div>

    <hr>

    <div class="section">
      <h3>Obsidian</h3>
      <p>Chat inside your notes app, synced across all devices.</p>
      <ol>
        <li>Install <a href="https://obsidian.md" target="_blank">Obsidian</a></li>
        <li>Settings → Community Plugins → Install <strong>BRAT</strong></li>
        <li>BRAT → Add Beta Plugin:</li>
      </ol>
      <div class="cmd" onclick="copy(this)">oscarhenrycollins/obsidianclaw</div>
      <p>Paste your Tailscale URL and token in the setup wizard.</p>
    </div>

    <hr>

    <div class="section">
      <h3>Browser</h3>
      <p>Open your Tailscale URL in any browser. Enter your token when asked.</p>
    </div>

    <div class="done">
      <h3>You're set.</h3>
      <p>Your AI is running 24/7. Questions? <a href="https://discord.com/invite/clawd">Join Discord.</a></p>
    </div>

    <a class="back" onclick="S.view='form';render()">← Start over</a>
  `
};

function pick(p, el) {
  S.path = p;
  document.querySelectorAll('.pick-card').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  const extra = document.getElementById('cloud_extra');
  if (extra) extra.classList.toggle('show', p === 'cloud');
}

function go() {
  S.claude = document.getElementById('in_claude').value.trim();
  S.brave = document.getElementById('in_brave').value.trim();
  if (!S.claude) return alert('Paste your Claude setup token.');
  if (!S.brave) return alert('Paste your Brave Search API key.');
  if (!S.path) return alert('Choose where to install.');

  if (S.path === 'local') { S.view = 'local'; render(); return; }

  S.hostinger = document.getElementById('in_hostinger').value.trim();
  S.region = document.getElementById('in_region').value;
  if (!S.hostinger) return alert('Paste your Hostinger API key.');
  S.view = 'creating'; render();
  createServer();
}

function localScript() {
  return `curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard && \\
openclaw config set tools.web.search.apiKey "${S.brave}" && \\
openclaw config set gateway.bind loopback && \\
openclaw config set gateway.tailscale.mode serve && \\
openclaw config set gateway.auth.mode token && \\
openclaw config set gateway.auth.allowTailscale true && \\
echo "${S.claude}" | openclaw models auth paste-token --provider anthropic --yes && \\
curl -fsSL https://tailscale.com/install.sh | sh && \\
sudo tailscale up && \\
openclaw gateway start`;
}

function serverScript() {
  return `#!/bin/bash
set -e
export DEBIAN_FRONTEND=noninteractive
curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
apt-get install -y nodejs
curl -fsSL https://openclaw.ai/install.sh | bash -s -- --no-onboard
openclaw config set tools.web.search.apiKey "${S.brave}"
openclaw config set gateway.bind loopback
openclaw config set gateway.tailscale.mode serve
openclaw config set gateway.auth.mode token
openclaw config set gateway.auth.allowTailscale true
echo "${S.claude}" | openclaw models auth paste-token --provider anthropic --yes
curl -fsSL https://tailscale.com/install.sh | sh
openclaw gateway start`;
}

async function api(method, path, body) {
  const r = await fetch('/api/hostinger', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ apiKey: S.hostinger, method, path, body })
  });
  return r.json();
}

async function createServer() {
  try {
    setStatus('Uploading setup script...');
    const s = await api('POST', '/api/vps/v1/post-install-scripts', { name: 'OpenClaw ' + Date.now(), content: serverScript() });
    if (!s.id) throw new Error(s.message || 'Script upload failed');

    setStatus('Creating server...');
    const vm = await api('POST', '/api/vps/v1/virtual-machines', {
      plan: 'hostingercom-vps-kvm2-usd-1m',
      data_center_id: parseInt(S.region),
      template_id: 1002,
      hostname: 'openclaw-ai',
      post_install_script_id: s.id
    });
    const id = vm.id || vm.virtual_machine_id;
    if (!id) throw new Error(vm.message || 'Server creation failed');

    setStatus('Server created. Installing everything...');
    for (let i = 0; i < 60; i++) {
      await sleep(5000);
      try {
        const st = await api('GET', `/api/vps/v1/virtual-machines/${id}`);
        if ((st.state || st.status) === 'running') {
          S.view = 'connect'; render(); return;
        }
      } catch {}
      setStatus(`Installing... ${i * 5}s`);
    }
    setStatus('Taking longer than expected. <a href="https://hpanel.hostinger.com" target="_blank">Check Hostinger.</a>');
  } catch (e) {
    setStatus(`Something went wrong: ${e.message}`);
  }
}

function setStatus(h) { const el = document.getElementById('status_text'); if (el) el.innerHTML = h; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function copy(el) { navigator.clipboard.writeText(el.textContent); el.classList.add('copied'); setTimeout(() => el.classList.remove('copied'), 2000); }

render();
</script>
</body>
</html>
